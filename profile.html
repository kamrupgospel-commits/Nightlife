<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightLife - Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ========== HEADER ========== -->
    <header>
        <div class="header-container">
            <div>
                <div class="logo">🌙 NightLife</div>
                <div class="logo-subtitle">Discover Your Next Event</div>
            </div>
            <div class="header-buttons">
                <button class="btn-profile" onclick="goHome()">🏠 Home</button>
            </div>
        </div>
    </header>

    <!-- ========== PROFILE SECTION ========== -->
    <section class="profile-container">
        <!-- ========== PROFILE HEADER ========== -->
        <div class="profile-header">
            <div class="profile-avatar">
                <span class="avatar-icon">👤</span>
            </div>
            <div class="profile-info">
                <h1 class="profile-name">Alex Johnson</h1>
                <p class="profile-email">alex.johnson@email.com</p>
                <p class="profile-joined">Member since March 2026</p>
                <div class="profile-stats">
                    <div class="stat">
                        <span class="stat-number going-count">0</span>
                        <span class="stat-label">Going</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number interested-count">0</span>
                        <span class="stat-label">Interested</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number attended-count">12</span>
                        <span class="stat-label">Attended</span>
                    </div>
                </div>
            </div>
            <div class="profile-actions">
                <button class="btn btn-edit">✏️ Edit Profile</button>
                <button class="btn btn-logout">🚪 Logout</button>
            </div>
        </div>

        <!-- ========== TABS ========== -->
        <div class="profile-tabs">
            <button class="tab-btn active" data-tab="going">Going 🎟️</button>
            <button class="tab-btn" data-tab="interested">Interested ★</button>
            <button class="tab-btn" data-tab="attended">Attended ✓</button>
            <button class="tab-btn" data-tab="bookmarked">Bookmarked 🔖</button>
        </div>

        <!-- ========== TAB CONTENTS ========== -->
        <!-- Going Events Tab -->
        <div id="going" class="tab-content active">
            <div id="goingContainer" class="events-list">
                <!-- Going events will be loaded here -->
            </div>
        </div>

        <!-- Interested Events Tab -->
        <div id="interested" class="tab-content">
            <div id="interestedContainer" class="events-list">
                <!-- Interested events will be loaded here -->
            </div>
        </div>

        <!-- Attended Events Tab -->
        <div id="attended" class="tab-content">
            <div id="attendedContainer" class="events-list">
                <!-- Attended events will be loaded here -->
            </div>
        </div>

        <!-- Bookmarked Events Tab -->
        <div id="bookmarked" class="tab-content">
            <div id="bookmarkedContainer" class="events-list">
                <!-- Bookmarked events will be loaded here -->
            </div>
        </div>
    </section>

    <!-- ========== SCRIPT ========== -->
    <script src="profile-script.js"></script>
</body>
</html>
