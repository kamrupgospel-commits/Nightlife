<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightLife - Discover Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ========== HEADER ========== -->
    <header>
        <div class="header-container">
            <div>
                <div class="logo">🌙 NightLife</div>
                <div class="logo-subtitle">Discover Your Next Event</div>
            </div>
        </div>
    </header>

    <!-- ========== SEARCH AND FILTER SECTION ========== -->
    <section class="search-filter-section">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input 
                type="text" 
                id="searchInput"
                placeholder="Search events by name, location..."
            >
        </div>

        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-category="all">All Events</button>
            <button class="filter-btn" data-category="club">🎵 Club</button>
            <button class="filter-btn" data-category="rooftop">🏢 Rooftop</button>
            <button class="filter-btn" data-category="live-music">🎸 Live Music</button>
            <button class="filter-btn" data-category="dj-night">🎧 DJ Night</button>
        </div>
    </section>

    <!-- ========== EVENTS GRID ========== -->
    <section class="events-container">
        <div id="eventsGrid">
            <!-- Events will be dynamically loaded here -->
        </div>
    </section>

    <!-- ========== EVENT DETAILS MODAL ========== -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeEventModal()">&times;</button>
            <div id="modalContent">
                <!-- Modal content will be dynamically loaded here -->
            </div>
            <!-- Going Button Section -->
            <div id="goingButtonContainer" style="display: none; padding: 2rem; border-top: 1px solid rgba(139, 92, 246, 0.2);">
                <button 
                    id="goingBtn"
                    data-event-id=""
                    class="going-btn"
                >
                    ✓ Going
                </button>
                <div 
                    id="confirmationMsg" 
                    class="hidden"
                >
                    ✨ You are attending this event 🎉
                </div>
            </div>
        </div>
    </div>

    <!-- ========== SCRIPT ========== -->
    <script src="script.js"></script>
</body>
</html>
